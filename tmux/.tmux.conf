# tmux system clipboard fix for macOS
set -g default-shell $SHELL

# 24 bit color support
# https://github.com/tmux/tmux/issues/34#issuecomment-241527745
set -ga terminal-overrides ",xterm-256color:Tc"

set -g prefix C-b
bind C-b send-prefix

# act like vim
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# keybindings to show/hide status and switch windows
# bind-key -n S-Up set-option -g status
# bind-key -n S-Down set-option -g status
bind-key -n S-Left previous-window
bind-key -n S-Right next-window

# keybinding to clear history
bind C-k clear-history \; display-message "history cleared"

# create new windows/panes in same directory
bind c new-window -c '#{pane_current_path}'
bind "\"" split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# Smart pane switching with awareness of vim splits
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

bind C-l send-keys 'C-l'

# C-b ! breaks current pane into separate window
# join a pane/window from the current session into the current window
bind @ command-prompt -p "create pane from:" "join-pane -s ':%%'"

# reload the .tmux.conf file with Ctrl-r
bind C-r source-file ~/.tmux.conf \; display-message "configuration reloaded"

# toggle passthrough of prefix
bind P if-shell "[ \"$(tmux show-options -g prefix)\" = \"prefix C-a\" ]" 'set -g prefix C-b; display-message "passthrough enabled"; refresh-client -S' 'set -g prefix C-a; display-message "passthrough disabled"; refresh-client -S'

# size windows based on clients looking at that window
# setw -g aggressive-resize on
setw -g aggressive-resize off

# enable mouse control
set -g mouse on

# start window numbers at 1 to match keyboard order with tmux order
set -g base-index 1

# start pane numbers at 1 to match keyboard order with tmux order
setw -g pane-base-index 1

# renumber windows sequentially after closing any of them
set -g renumber-windows on

# monitor windows for activity
setw -g monitor-activity on

# don't wait for escape sequences
set -sg escape-time 0

# display pane numbers for longer
set -g display-panes-time 2000

# increase scrollback lines
set -g history-limit 65536

# appearance

# set-option -g status-fg white
# set-option -g status-bg default
# set-option -g status-attr default
# set-window-option -g window-status-fg "#666666"
# set-window-option -g window-status-bg default
# set-window-option -g window-status-attr default
# set-window-option -g window-status-current-fg red
# set-window-option -g window-status-current-bg default
# set-window-option -g window-status-current-attr default
# set-option -g message-fg white
# set-option -g message-bg black
# set-option -g message-attr bright
# set -g status-left " "
# set -g status-justify centre
# set -g window-status-format '#(if [ #{pane_current_command} = "zsh" ]; then basename #{pane_current_path}; elif [ #{pane_current_command} = "nvim" ]; then echo "#T"; else echo "#{pane_current_command}"; fi;)'
# set -g window-status-current-format '#(if [ #{pane_current_command} = "zsh" ]; then basename #{pane_current_path}; elif [ #{pane_current_command} = "nvim" ]; then echo "#T"; else echo "#{pane_current_command}"; fi;)'
# set -g status-right " "

# remove administrative debris (time) in status bar
set -g status-left-length 75 
set -g status-left ''
set -g status-right ''

# centre window list
set -g status-justify centre

# show if we are in prefix mode
set -g  status-left '#{?client_prefix,#[fg=brightmagenta],}'

# host information
set -ga status-right '#H/#S'

# default statusbar colors
set -g status-style "fg=white"
set -g message-style "fg=brightmagenta"

# window indicators
setw -g window-status-style "fg=brightblack"
setw -g window-status-current-style "fg=blue"
setw -g window-status-activity-style "fg=green"
setw -g window-status-bell-style "fg=red"

# Allow local customization in ~/.tmux_local.conf
if-shell "[ -f ~/.tmux_local.conf ]" 'source ~/.tmux_local.conf'

